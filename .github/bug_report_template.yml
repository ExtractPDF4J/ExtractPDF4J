name: Bug Report
description: Report a reproducible bug in ExtractPDF4J.
title: "[Bug] <Short description>"
labels: ["bug"]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Include minimal reproducible steps. Attach PDF if allowed.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Java version, ExtractPDF4J version.
